<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ZBR Warehouse</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Ekran logowania -->
  <div class="login-container">
    <h2>Logowanie</h2>
    <form class="login-form" id="loginForm">
      <label for="username">Login:</label>
      <input type="text" id="username" name="username" required>

      <label for="password">Hasło:</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">Zaloguj się</button>
    </form>
  </div>

  <!-- Reszta strony, początkowo ukryta -->
  <header class="navbar main-content" style="display:none;">
    <div class="logo">
      <img src="images/ZBR_logo.png" alt="Logo ZBR" class="logo-img"> 
      <span>ZBR Warehouse</span>
    </div>
    <div class="user">
      <span>Witaj, Kamil</span>
      <button class="logout">Wyloguj się</button>
    </div>
  </header>

  <div class="secondbar main-content" style="display:none;">
    <nav class="submenu">
      <button id="btnStany" class="submenu-btn">Stany magazynowe</button>
      <button class="submenu-btn">Wydanie towaru</button>
      <button class="submenu-btn">Raporty</button>
    </nav>
  </div>

  <main class="content main-content" style="display:none;">
  <!-- Pusta przestrzeń pod secondbar, tabela będzie wstawiana dynamicznie -->
  <div id="inventory" class="hidden"></div>
</main>

<script>
  // Obsługa przycisku Stany magazynowe
document.addEventListener('DOMContentLoaded', () => {
  const btnStany = document.getElementById("btnStany");
  const container = document.getElementById("inventory");

  btnStany.addEventListener("click", () => {
    // jeśli jeszcze puste → wstaw tabelę
    if (!container.innerHTML) {
      // dodaj klasę inventory, jeśli jeszcze jej nie ma
      container.classList.add("inventory");

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Produkt</th>
              <th>SKU</th>
              <th>Ilość</th>
              <th>Data</th>
              <th>Dział</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Przykładowy produkt</td>
              <td>SKU123</td>
              <td>50</td>
              <td>2025-09-15</td>
              <td>Magazyn A</td>
            </tr>
          </tbody>
        </table>
      `;
    }

    // pokaż/ukryj tabelę
    container.classList.toggle("hidden");
  });
});

</script>


  <!-- Skrypty -->
  <script>
  // Logowanie
  const form = document.getElementById('loginForm');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
      document.querySelector('.login-container').style.display = 'none';
      document.querySelectorAll('.main-content').forEach(el => el.style.display = 'block');
    } else {
      alert('Błędny login lub hasło');
    }
  });

  // Wylogowanie
  const logoutBtn = document.querySelector('.logout');

  logoutBtn.addEventListener('click', () => {
    document.querySelectorAll('.main-content').forEach(el => el.style.display = 'none');
    document.querySelector('.login-container').style.display = 'flex';
    // ukryj tabelę przy wylogowaniu
    document.getElementById('inventory').classList.add('hidden');
  });

  </script>
</body>
</html>
