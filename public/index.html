<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ZBR Warehouse</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Ekran logowania -->
  <div class="login-container">
    <h2>Logowanie</h2>
    <form class="login-form" id="loginForm">
      <label for="username">Login:</label>
      <input type="text" id="username" name="username" required>
      <label for="password">Hasło:</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Zaloguj się</button>
    </form>
  </div>

  <!-- Reszta strony -->
  <header class="navbar main-content" style="display:none;">
    <div class="logo">
      <img src="images/ZBR_logo.png" alt="Logo ZBR" class="logo-img">
      <span>ZBR Warehouse</span>
    </div>
    <div class="user">
      <span>Witaj, Kamil</span>
      <button class="logout">Wyloguj się</button>
    </div>
  </header>

  <div class="secondbar main-content" style="display:none;">
    <nav class="submenu">
      <button id="btnStany" class="submenu-btn">Stany magazynowe</button>
      <button class="submenu-btn">Wydanie towaru</button>
      <button class="submenu-btn">Raporty</button>
      <button id="btnRaporty" class="submenu-btn">Generowanie raportów</button>
    </nav>
  </div>

  <main class="content main-content" style="display:none;">
    <!-- Sekcja inventory -->
    <div id="inventory" class="hidden">
      <div class="add-product">
        <button id="openModal" class="add-btn"><span class="plus">+</span></button>
        <span class="add-text">Dodaj nowy produkt</span>
      </div>
      <div class="inventory table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Produkt</th>
              <th>SKU</th>
              <th>Ilość</th>
              <th>Data</th>
              <th>Dział</th>
            </tr>
          </thead>
          <tbody id="productTableBody">
            <tr>
              <td>Przykładowy produkt</td>
              <td>SKU123</td>
              <td>50</td>
              <td>2025-09-15</td>
              <td>Magazyn A</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Sekcja raportów -->
    <div id="reports" class="hidden">
      <div class="reports-bar">
        <button class="report-btn">Raport 1</button>
        <button class="report-btn">Raport 2</button>
        <button class="report-btn">Raport 3</button>
      </div>
      <div class="report-placeholder">
        <p>Podgląd raportu pojawi się tutaj</p>
      </div>
    </div>
  </main>

  <!-- Modal dodawania produktu -->
  <div id="addProductModal" class="modal hidden">
    <div class="modal-content">
      <h2>Dodaj nowy produkt</h2>
      <form id="addProductForm">
        <label>Produkt
          <input type="text" name="produkt" required>
        </label>
        <label>SKU
          <input type="text" name="sku" required>
        </label>
        <label>Ilość
          <input type="number" name="ilosc" required>
        </label>
        <label>Data
          <input type="date" name="data" required>
        </label>
        <label>Dział
          <input type="text" name="dzial" required>
        </label>
        <div class="modal-buttons">
          <button type="submit">Dodaj</button>
          <button type="button" id="closeModal">Anuluj</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
